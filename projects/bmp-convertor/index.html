<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMP Convertor | Project | ArsuMinSo</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f7fa;
            color: #222;
        }
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        h1 {
            color: #007acc;
            margin-top: 0;
        }
        a {
            color: #007acc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }
        .markdown-body {
            font-size: 1.1rem;
        }
        pre, code {
            background: #f3f3f3;
            border-radius: 4px;
            padding: 0.2em 0.4em;
            font-size: 0.98em;
        }
        pre {
            padding: 1em;
            overflow-x: auto;
        }
        hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 2em 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <main>
        <a href="../../index.html" class="back-link">&larr; Back to Portfolio</a>
        <div id="markdown-content" class="markdown-body"></div>
    </main>
    <script>
    fetch('README.md')
        .then(res => res.text())
        .then(md => {
            document.getElementById('markdown-content').innerHTML = marked.parse(md);
        });
    </script>
</body>
</html>
